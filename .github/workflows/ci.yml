name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支新推送自动取消旧的在跑任务
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: 后端测试 (pytest · 129 用例)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: 装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements-dev.txt

      - name: 安装依赖 (含 fakeredis / aiosqlite;playwright 仅装包,不下载浏览器)
        run: pip install -r requirements-dev.txt

      - name: 运行测试 (内存 SQLite + FakeRedis,无需外部 MySQL/Redis)
        run: pytest -q

  frontend:
    name: 前端构建 (vue-tsc + vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: 装 Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 安装依赖
        run: npm ci

      - name: 类型检查 + 构建
        run: npm run build
