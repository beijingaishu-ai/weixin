worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20m;   # 素材/封面上传(M2 起用到)

    # ---- HTTP:仅放行 ACME 续期挑战,其余全部 301 跳 HTTPS ----
    server {
        listen 80;
        server_name jingju.llxww.com;
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- HTTPS 主站 ----
    server {
        listen 443 ssl;
        server_name jingju.llxww.com;

        ssl_certificate     /etc/letsencrypt/live/jingju.llxww.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/jingju.llxww.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_session_cache shared:SSL:10m;

        # Docker 内网 DNS:api 主机名按请求动态解析,避免容器重建换 IP 后 502
        resolver 127.0.0.11 valid=10s ipv6=off;

        # ---- 前端静态资源(Vue 构建产物)----
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;   # SPA history 路由回退
        }

        # ---- 后端 API 反向代理(变量式 proxy_pass 触发按请求重解析)----
        location /api/ {
            set $api_upstream http://api:8000;
            proxy_pass $api_upstream;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Swagger 文档 / 健康检查
        location ~ ^/(docs|redoc|openapi.json|health)$ {
            set $api_docs http://api:8000;
            proxy_pass $api_docs;
            proxy_set_header Host $host;
        }

        # wx-gateway 内部接口不对外暴露
        location /api/v1/internal/ {
            return 404;
        }
    }
}
